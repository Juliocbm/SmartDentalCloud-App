<!-- Toast notifications -->
<div class="toast-container" aria-live="polite" aria-atomic="false">
  @for (notification of notifications(); track notification.id) {
    <div class="toast toast-{{ notification.type }}" [class.toast-dismissing]="notification.dismissing" role="alert">
      <div class="toast-icon">
        <i class="fa-solid {{ getIcon(notification.type) }}"></i>
      </div>
      <div class="toast-message">{{ notification.message }}</div>
      <button class="toast-close" (click)="dismiss(notification.id)" aria-label="Cerrar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  }
</div>

<!-- Confirm dialog -->
@if (pendingConfirm(); as confirm) {
  <app-modal
    [title]="confirm.title"
    [icon]="getConfirmIcon(confirm.type)"
    size="sm"
    (closed)="onCancel()">

    <p class="confirm-message">{{ confirm.message }}</p>

    <div modal-footer>
      <button class="btn btn-outline" (click)="onCancel()">
        <i class="fa-solid fa-times"></i>
        {{ confirm.cancelText }}
      </button>
      <button class="btn btn-outline" [ngClass]="getConfirmBtnClass(confirm.type)" (click)="onConfirm()">
        <i class="fa-solid fa-check"></i>
        {{ confirm.confirmText }}
      </button>
    </div>
  </app-modal>
}
