<div class="dentist-schedule-manager">
  <div class="section-header">
    <div class="section-header__info">
      <h3 class="section-header__title">
        <i class="fa-solid fa-user-doctor"></i>
        Horarios por Dentista
      </h3>
      <p class="section-header__description">Configura horarios individuales para cada dentista. Si un dentista no tiene horario propio, se usa el horario del consultorio.</p>
    </div>
    @if (selectedDentistId()) {
      <button class="btn btn-outline btn-sm" [disabled]="editorRef()?.saving() || !editorRef()?.isFormValid()" (click)="editorRef()?.save()">
        @if (editorRef()?.saving()) {
          <span class="btn-spinner"></span>
          Guardando...
        } @else {
          <i class="fa-solid fa-floppy-disk"></i>
          Guardar Horario
        }
      </button>
    }
  </div>
  <hr>

  <div class="dentist-selector-row">
    <div class="dentist-selector">
      <app-dentist-autocomplete
        [selectedDentistId]="selectedDentistId()"
        placeholder="Buscar dentista..."
        (dentistSelected)="onDentistSelected($event)"
      >
        Seleccionar Dentista
      </app-dentist-autocomplete>
    </div>
    <div class="location-selector">
      <app-location-autocomplete
        [selectedLocationId]="selectedLocationId()"
        placeholder="Seleccionar sucursal..."
        (locationSelected)="onLocationSelected($event)"
      >
        Sucursal
      </app-location-autocomplete>
    </div>
  </div>

  @if (selectedDentistId()) {
      <div class="dentist-editor">
        <app-work-schedule-editor
          #dentistScheduleEditor
          [userId]="selectedDentistId()"
          [showHeader]="false"
          [showLocationSelector]="false"
          [locationId]="selectedLocationId()"
        />
      </div>
    } @else {
      <app-empty-state
        type="informative"
        title="Selecciona un dentista"
        description="Elige un dentista del listado para configurar su horario individual"
        icon="fa-hand-pointer"
      />
    }
</div>
