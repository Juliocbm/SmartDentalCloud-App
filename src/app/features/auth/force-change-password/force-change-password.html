<div class="auth-container">
  <div class="auth-theme-toggle">
    <app-theme-toggle />
  </div>
  <div class="auth-card">
    <div class="auth-header">
      <i class="fa-solid fa-shield-halved"></i>
      <h1>SmartDental</h1>
      <p>Cambio de Contraseña Requerido</p>
    </div>

    <div class="force-change-notice">
      <i class="fa-solid fa-circle-info"></i>
      <span>Por seguridad, debes cambiar tu contraseña temporal antes de continuar.</span>
    </div>

    <app-form-alert [message]="errorMessage()" [dismissible]="false" />

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="currentPassword" class="form-label">
          <i class="fa-solid fa-key"></i>
          Contraseña Temporal
        </label>
        <div class="password-input-wrapper">
          <input
            [type]="showCurrentPassword() ? 'text' : 'password'"
            id="currentPassword"
            class="form-input"
            placeholder="Ingresa tu contraseña temporal"
            [ngModel]="currentPassword()"
            (ngModelChange)="currentPassword.set($event)"
            name="currentPassword"
            required
          />
          <button
            type="button"
            class="toggle-password-btn"
            (click)="toggleCurrentPasswordVisibility()"
            tabindex="-1"
          >
            <i class="fa-solid" [ngClass]="showCurrentPassword() ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword" class="form-label">
          <i class="fa-solid fa-lock"></i>
          Nueva Contraseña
        </label>
        <div class="password-input-wrapper">
          <input
            [type]="showNewPassword() ? 'text' : 'password'"
            id="newPassword"
            class="form-input"
            placeholder="Mínimo 8 caracteres"
            [ngModel]="newPassword()"
            (ngModelChange)="newPassword.set($event)"
            name="newPassword"
            required
            minlength="8"
          />
          <button
            type="button"
            class="toggle-password-btn"
            (click)="toggleNewPasswordVisibility()"
            tabindex="-1"
          >
            <i class="fa-solid" [ngClass]="showNewPassword() ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="form-label">
          <i class="fa-solid fa-lock"></i>
          Confirmar Contraseña
        </label>
        <input
          type="password"
          id="confirmPassword"
          class="form-input"
          [class.error]="!passwordsMatch()"
          placeholder="Repite la nueva contraseña"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          name="confirmPassword"
          required
        />
        @if (!passwordsMatch()) {
          <div class="error-message">
            <span>Las contraseñas no coinciden</span>
          </div>
        }
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block btn-auth"
        [disabled]="!isFormValid() || loading()"
      >
        @if (loading()) {
          <div class="spinner spinner-sm"></div>
          <span>Cambiando contraseña...</span>
        } @else {
          <i class="fa-solid fa-check-double"></i>
          <span>Cambiar Contraseña y Continuar</span>
        }
      </button>
    </form>

    <div class="auth-footer-link">
      <a href="javascript:void(0)" (click)="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        Cerrar Sesión
      </a>
    </div>

    <div class="auth-footer">
      <p>&copy; 2026 SmartDental Cloud. Todos los derechos reservados.</p>
    </div>
  </div>
</div>
