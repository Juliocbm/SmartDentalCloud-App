<div class="page-container container-wide">
  <app-page-header
    [title]="getTitle()"
    subtitle="Trazado y análisis cefalométrico digital"
    icon="fa-solid fa-x-ray"
    [showBackButton]="true"
    [backRoute]="'/patients/' + patientId"
    [breadcrumbs]="breadcrumbItems"
  >
    @if (analysis(); as a) {
      <div title-extra>
        <span class="badge"
          [ngClass]="CEPH_STATUS_CONFIG[a.status].cssClass">
          <i [class]="'fa-solid ' + CEPH_STATUS_CONFIG[a.status].icon"></i>
          {{ CEPH_STATUS_CONFIG[a.status].label }}
        </span>
      </div>
    }
  </app-page-header>

  @if (loading() || creating()) {
    <div class="loading-container">
      <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
      <p>{{ creating() ? 'Creando análisis...' : 'Cargando análisis...' }}</p>
    </div>
  } @else if (error()) {
    <app-empty-state
      type="error"
      title="Error"
      [description]="error()!"
      icon="fa-exclamation-circle"
      [showAction]="true"
      actionLabel="Volver"
      actionIcon="fa-arrow-left"
      actionType="button"
      actionStyleClass="btn btn-outline"
      (actionClick)="goBack()"
    />
  } @else if (analysis()) {
    <ceph-tracer
      [analysisId]="analysis()!.id"
      [patientId]="patientId"
      [initialAnalysis]="analysis()!"
    ></ceph-tracer>
  }
</div>
