<app-modal
  [title]="'Subir Radiografía'"
  [subtitle]="'Adjuntar imagen radiológica al expediente'"
  [icon]="'fa-image'"
  [size]="'md'"
  (closed)="onClose()"
>
  <form [formGroup]="form">
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Tipo de imagen <span class="required">*</span></label>
        <select class="form-input" formControlName="imageType">
          @for (type of IMAGE_TYPES; track type.value) {
            <option [value]="type.value">{{ type.label }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Título <span class="required">*</span></label>
        <input type="text" class="form-input" formControlName="title"
          placeholder="Ej: Periapical pieza 14" />
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Fecha de toma</label>
        <input type="date" class="form-input" formControlName="takenAt" />
      </div>
      <div class="form-group">
        <label class="form-label">Archivo <span class="required">*</span></label>
        <input type="file" class="form-input" accept="image/*,.pdf,.dcm"
          (change)="onFileSelected($event)" />
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <input type="text" class="form-input" formControlName="description"
          placeholder="Descripción breve" />
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <input type="text" class="form-input" formControlName="notes"
          placeholder="Notas clínicas" />
      </div>
    </div>
  </form>

  <div modal-footer>
    <button type="button" class="btn btn-outline" (click)="onClose()" [disabled]="loading()">
      <i class="fa-solid fa-times"></i>
      Cancelar
    </button>
    <button type="button" class="btn btn-outline btn-success" (click)="onSubmit()"
      [disabled]="loading() || form.invalid || !selectedFile()">
      @if (loading()) {
        <span class="btn-spinner"></span>
        Subiendo...
      } @else {
        <i class="fa-solid fa-upload"></i>
        Subir Radiografía
      }
    </button>
  </div>
</app-modal>
