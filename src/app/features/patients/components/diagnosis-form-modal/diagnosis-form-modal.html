<app-modal
  [title]="'Nuevo Diagnóstico'"
  [subtitle]="'Registrar diagnóstico del paciente'"
  [icon]="'fa-clipboard-list'"
  [size]="'md'"
  (closed)="onClose()"
>
  <form [formGroup]="form">
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Descripción <span class="required">*</span></label>
        <input type="text" class="form-input" formControlName="description"
          placeholder="Ej: Caries dental múltiple" />
      </div>
      <div class="form-group">
        <label class="form-label">Código CIE-10</label>
        <app-cie10-autocomplete
          (codeSelected)="onCie10Selected($event)" />
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Severidad</label>
        <select class="form-input" formControlName="severity">
          <option value="">— Sin especificar —</option>
          @for (opt of severityOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de Inicio</label>
        <input type="date" class="form-input" formControlName="onsetDate" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <input type="text" class="form-input" formControlName="notes"
        placeholder="Observaciones..." />
    </div>
  </form>

  <div modal-footer>
    <button type="button" class="btn btn-outline" (click)="onClose()" [disabled]="loading()">
      <i class="fa-solid fa-times"></i>
      Cancelar
    </button>
    <button type="button" class="btn btn-outline btn-success" (click)="onSubmit()" [disabled]="loading() || form.invalid">
      @if (loading()) {
        <span class="btn-spinner"></span>
        Guardando...
      } @else {
        <i class="fa-solid fa-plus"></i>
        Registrar Diagnóstico
      }
    </button>
  </div>
</app-modal>
