<!-- Options panel -->
<div class="page-container container-medium">
  <app-page-header
    [title]="'Resumen Clínico'"
    [subtitle]="'Generar PDF del resumen clínico del paciente'"
    [icon]="'fa-file-medical'"
    [showBackButton]="true"
    [backRoute]="'/patients/' + patientId"
    [breadcrumbs]="breadcrumbItems">
  </app-page-header>

  <div class="content-card">
    <h3 class="section-title">
      <i class="fa-solid fa-sliders section-icon"></i>
      Opciones de Exportación
    </h3>

    <div class="options-grid">
      <label class="checkbox-label">
        <input type="checkbox" [ngModel]="includeAllergies()"
          (ngModelChange)="includeAllergies.set($event)" />
        <span>Incluir Alergias</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" [ngModel]="includeDiagnoses()"
          (ngModelChange)="includeDiagnoses.set($event)" />
        <span>Incluir Lista de Diagnósticos</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" [ngModel]="includeTreatments()"
          (ngModelChange)="includeTreatments.set($event)" />
        <span>Incluir Tratamientos</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" [ngModel]="includePrescriptions()"
          (ngModelChange)="includePrescriptions.set($event)" />
        <span>Incluir Recetas</span>
      </label>
    </div>

    <div class="date-range">
      <div class="form-group">
        <label class="form-label">Desde (opcional)</label>
        <input type="date" class="form-input"
          [ngModel]="fromDate()" (ngModelChange)="fromDate.set($event)" />
      </div>
      <div class="form-group">
        <label class="form-label">Hasta (opcional)</label>
        <input type="date" class="form-input"
          [ngModel]="toDate()" (ngModelChange)="toDate.set($event)" />
      </div>
    </div>

    <app-form-alert [message]="error()" [dismissible]="false" />

    <div class="form-actions">
      <button class="btn btn-primary" (click)="generateExport()" [disabled]="loading()">
        @if (loading()) {
          <span class="btn-spinner"></span>
          Generando...
        } @else {
          <i class="fa-solid fa-print"></i>
          Generar PDF
        }
      </button>
    </div>
  </div>
</div>
