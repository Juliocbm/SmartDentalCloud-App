<app-modal
  [title]="'Nueva Alergia'"
  [subtitle]="'Registrar alergia del paciente'"
  [icon]="'fa-shield-virus'"
  [size]="'md'"
  (closed)="onClose()"
>
  <form [formGroup]="form">
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Tipo de Alérgeno <span class="required">*</span></label>
        <select class="form-input" formControlName="allergenType">
          @for (t of ALLERGEN_TYPES; track t.value) {
            <option [value]="t.value">{{ t.label }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre del Alérgeno <span class="required">*</span></label>
        <input type="text" class="form-input" formControlName="allergenName"
          placeholder="Ej: Penicilina, Maní, Polen..." />
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Severidad <span class="required">*</span></label>
        <select class="form-input" formControlName="severity">
          @for (s of ALLERGY_SEVERITIES; track s.value) {
            <option [value]="s.value">{{ s.label }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de Detección</label>
        <input type="date" class="form-input" formControlName="detectedAt" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descripción de la Reacción</label>
      <textarea class="form-input" rows="2" formControlName="reactionDescription"
        placeholder="Describa la reacción alérgica..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea class="form-input" rows="2" formControlName="notes"
        placeholder="Observaciones adicionales..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-check">
        <input type="checkbox" formControlName="verifiedByProfessional" />
        <span>Verificado por profesional de salud</span>
      </label>
    </div>
  </form>

  <div modal-footer>
    <button type="button" class="btn btn-outline" (click)="onClose()" [disabled]="loading()">
      <i class="fa-solid fa-times"></i>
      Cancelar
    </button>
    <button type="button" class="btn btn-outline btn-success" (click)="onSubmit()" [disabled]="loading() || form.invalid">
      @if (loading()) {
        <span class="btn-spinner"></span>
        Guardando...
      } @else {
        <i class="fa-solid fa-plus"></i>
        Registrar Alergia
      }
    </button>
  </div>
</app-modal>
