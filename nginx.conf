# ================================================================
# nginx.conf — SmartDental Cloud Angular App
# Optimizado para rendimiento enterprise: Brotli, cache agresivo,
# HTTP/2, headers de seguridad y SPA fallback
# ================================================================

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── General Performance ────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  server_tokens      off;
  client_max_body_size 20M;

  # ── Gzip (fallback cuando Brotli no está disponible) ───────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/manifest+json
    image/svg+xml
    font/woff
    font/woff2;

  # ── Brotli (requiere ngx_brotli module) ────────────────────────
  # Descomenta si el servidor tiene el módulo ngx_brotli compilado:
  # brotli on;
  # brotli_comp_level 6;
  # brotli_types text/css application/javascript application/json
  #              application/manifest+json image/svg+xml font/woff2;

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirigir HTTP → HTTPS en producción
    # return 301 https://$host$request_uri;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Service Worker: sin caché para que siempre esté fresco ───
    location = /ngsw-worker.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
      add_header Service-Worker-Allowed "/";
      expires off;
    }

    location = /ngsw.json {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      expires off;
    }

    # ── WebManifest: short cache ──────────────────────────────────
    location = /manifest.webmanifest {
      add_header Cache-Control "public, max-age=3600";
      add_header Content-Type  "application/manifest+json";
    }

    # ── Angular hashed assets: cache inmutable (1 año) ───────────
    # Angular genera nombres como main.HASH.js — nunca cambian su contenido
    location ~* \.[0-9a-f]{8,}\.(js|css|mjs)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # ── Fonts y assets estáticos: cache largo ────────────────────
    location ~* \.(woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|avif|gif|ico)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # ── HTML raíz: nunca cachear (controla actualización del SW) ──
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      expires off;
    }

    # ── SPA Fallback: todas las rutas Angular → index.html ────────
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── API Proxy (si sirves el backend desde el mismo host) ──────
    # location /api/ {
    #   proxy_pass         https://api.smartdentalcloud.com/api/;
    #   proxy_http_version 1.1;
    #   proxy_set_header   Upgrade $http_upgrade;
    #   proxy_set_header   Connection 'upgrade';
    #   proxy_set_header   Host $host;
    #   proxy_cache_bypass $http_upgrade;
    # }
  }

  # ── HTTPS Server (producción) ──────────────────────────────────
  # server {
  #   listen 443 ssl http2;
  #   listen [::]:443 ssl http2;
  #   server_name app.smartdentalcloud.com;
  #
  #   ssl_certificate     /etc/ssl/certs/smartdentalcloud.crt;
  #   ssl_certificate_key /etc/ssl/private/smartdentalcloud.key;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_session_cache   shared:SSL:10m;
  #
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  #
  #   # ... (mismas reglas de location que arriba)
  # }
}
